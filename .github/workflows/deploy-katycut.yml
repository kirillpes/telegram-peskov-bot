name: Deploy KatyCut

on:
  push:
    branches: [main]
    paths:
      - 'katycut/**'
      - 'docker-compose.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@master
        with:
          host: 89.223.65.25
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /root/telegram-bots
            git pull origin main
            docker compose down katycut
            docker compose up -d --build katycut
            echo "KatyCut deployed successfully!"
            docker compose logs --tail=20 katycut
